<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Вопрос ❤️</title>

<style>

body{
font-family:Arial;
text-align:center;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
overflow:hidden;
}

h1{
font-size:38px;
color:white;
margin-bottom:40px;
}

button{
font-size:20px;
padding:15px 30px;
margin:10px;
border:none;
border-radius:12px;
cursor:pointer;
transition:0.2s;
}

#yes{
background:#ff2e88;
color:white;
}

#no{
background:white;
}

#message{
margin-top:30px;
font-size:26px;
color:white;
display:none;
}

</style>

</head>

<body>

<h1>Пойдешь со мной на свидание? ❤️</h1>

<button id="yes">Приду ❤️</button>
<button id="no">Не могу</button>

<div id="message">
Я знал что ты скажешь да 😄  
Напиши мне ❤️
</div>

<script>

const noButton = document.getElementById("no");

noButton.addEventListener("mouseover",function(){

const x = Math.random()*window.innerWidth;
const y = Math.random()*window.innerHeight;

noButton.style.position="absolute";
noButton.style.left=x+"px";
noButton.style.top=y+"px";

});

document.getElementById("yes").onclick=function(){

document.getElementById("message").style.display="block";

}

</script>

</body>
</html>
