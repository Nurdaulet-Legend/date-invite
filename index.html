<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Приглашение ❤️</title>

<style>

body{
font-family:Arial;
text-align:center;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

h1{
color:white;
font-size:32px;
}

button{
font-size:20px;
padding:15px 25px;
margin:10px;
border:none;
border-radius:12px;
cursor:pointer;
}

#yes{
background:#ff2e88;
color:white;
}

#no{
background:white;
}

</style>

</head>

<body>

<h1>Пойдёшь со мной на свидание? ❤️</h1>

<button id="yes">Приду ❤️</button>
<button id="no">Не могу</button>

<script>

const noBtn = document.getElementById("no");

function moveButton(){

let x = Math.random() * (window.innerWidth - 100);
let y = Math.random() * (window.innerHeight - 50);

noBtn.style.position = "absolute";
noBtn.style.left = x + "px";
noBtn.style.top = y + "px";

}

noBtn.addEventListener("click", moveButton);
noBtn.addEventListener("touchstart", moveButton);

document.getElementById("yes").onclick = function(){

// отправка сигнала через скрытую форму
fetch("https://docs.google.com/forms/d/e/1FAIpQLSfplnJXzyMQEHZU2lu4IdXGoqwcGWQOiNT1FdzIUh2710vF9g/formResponse",{
method:"POST",
mode:"no-cors",
body:new FormData()
});

// переход на страницу с адресом
window.location.href="address.html";

}

</script>

</body>
</html>
