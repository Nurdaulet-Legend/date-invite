<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>❤️ Спасибо за ответ! ❤️</title>
<style>
  body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at top left, #ff9a9e, #fad0c4, #fbc2eb);
    overflow: hidden;
    position: relative;
    text-align: center;
  }

  h1 {
    color: white;
    font-size: 3rem;
    text-shadow: 2px 2px 10px rgba(0,0,0,0.2);
    margin-bottom: 30px;
  }

  p {
    color: white;
    font-size: 1.5rem;
    margin-bottom: 40px;
    text-shadow: 1px 1px 5px rgba(0,0,0,0.2);
  }

  /* Сердечки анимация */
  .heart {
    position: absolute;
    font-size: 2rem;
    color: #ff2e88;
    animation: floatUp 6s linear infinite;
    pointer-events: none;
    opacity: 0.8;
  }

  @keyframes floatUp {
    0% { transform: translateY(0) scale(1); opacity:0.8; }
    50% { opacity:1; }
    100% { transform: translateY(-100vh) scale(1.5); opacity:0; }
  }

  /* Кнопка назад */
  a.button {
    display: inline-block;
    font-size: 1.5rem;
    padding: 18px 35px;
    margin: 15px;
    border: none;
    border-radius: 25px;
    cursor: pointer;
    box-shadow: 0 8px 15px rgba(0,0,0,0.2);
    text-decoration: none;
    color: white;
    background: linear-gradient(45deg, #ff416c, #ff4b2b);
    transition: all 0.3s ease;
  }
  a.button:hover {
    transform: scale(1.1);
    box-shadow: 0 12px 20px rgba(0,0,0,0.3);
  }
</style>
</head>
<body>

<h1>Спасибо за твой ответ! ❤️</h1>
<p>Я очень рад(а), что ты согласился(ась) пойти на свидание!</p>
<a href="index.html" class="button">Назад к приглашению</a>

<script>
// анимация плавающих сердечек
function createHeart() {
  const heart = document.createElement('div');
  heart.className = 'heart';
  heart.style.left = Math.random() * window.innerWidth + 'px';
  heart.style.fontSize = 16 + Math.random()*32 + 'px';
  heart.innerText = '❤️';
  document.body.appendChild(heart);
  setTimeout(()=>{ heart.remove(); },6000);
}
setInterval(createHeart, 500);
</script>

</body>
</html>
